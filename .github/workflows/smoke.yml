name: Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON fixtures
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for path in Path(".").rglob("*.json"):
              with path.open("r", encoding="utf-8") as handle:
                  json.load(handle)
              print(f"OK {path}")
          PY

      - name: Run reverse-trace smoke test
        run: python scripts/smoke_test_reverse_trace.py
